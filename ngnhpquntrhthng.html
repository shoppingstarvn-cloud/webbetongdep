<style>
        .industrial-bg {
            background-color: #f8f9fb;
            background-image: linear-gradient(#e0e3e5 1px, transparent 1px), linear-gradient(90deg, #e0e3e5 1px, transparent 1px);
            background-size: 24px 24px;
            background-position: center center;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

<body class="min-h-screen flex items-center justify-center industrial-bg font-body-md text-on-surface antialiased p-4">
<!-- Login Container -->
<main class="w-full max-w-[440px] bg-surface-container-lowest border border-outline-variant rounded shadow-[0px_4px_12px_rgba(26,43,60,0.08)] overflow-hidden">
<!-- Header Area -->
<div class="bg-surface-container-low px-8 py-10 flex flex-col items-center justify-center border-b border-outline-variant">
<!-- Brand Logo -->
<div class="flex items-center gap-2 mb-6">
<span class="material-symbols-outlined text-on-tertiary-container text-4xl" style="font-variation-settings: 'FILL' 1;">architecture</span>
<h1 class="font-headline-md text-headline-md text-primary tracking-tighter uppercase font-black">CONCRETEPRO</h1>
</div>
<h2 class="font-headline-sm text-headline-sm text-primary text-center">Admin Portal Access</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-2 text-center">Enter your credentials to manage the system.</p>
</div>
<!-- Form Area -->
<div class="px-8 py-8">
<form action="#" class="space-y-6" method="POST">
<!-- Username/Email -->
<div class="space-y-1">
<label class="block font-label-bold text-label-bold text-on-surface uppercase" for="username">Username or Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant bg-surface text-on-surface font-body-md text-body-md rounded focus:ring-primary focus:border-primary focus:bg-surface-container-lowest transition-colors" id="username" name="username" placeholder="admin@concretepro.com" required="" type="text"/>
</div>
</div>
<!-- Password -->
<div class="space-y-1">
<label class="block font-label-bold text-label-bold text-on-surface uppercase" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 border border-outline-variant bg-surface text-on-surface font-body-md text-body-md rounded focus:ring-primary focus:border-primary focus:bg-surface-container-lowest transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface focus:outline-none transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex items-center justify-between">
<div class="flex items-center">
<input class="h-4 w-4 text-on-tertiary-container border-outline-variant rounded focus:ring-on-tertiary-container bg-surface" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-sm text-body-sm text-on-surface-variant" for="remember-me">
                            Remember me
                        </label>
</div>
<div class="text-sm">
<a class="font-body-sm text-body-sm text-on-tertiary-container hover:text-tertiary-fixed-dim font-medium transition-colors" href="#">
                            Forgot password?
                        </a>
</div>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded shadow-sm font-label-bold text-label-bold text-on-tertiary bg-on-tertiary-container hover:bg-tertiary-fixed-dim hover:text-on-tertiary-fixed-variant focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-on-tertiary-container transition-colors uppercase mt-8" type="submit">
                    Sign In
                    <span class="material-symbols-outlined ml-2 text-lg">login</span>
</button>
</form>
<!-- Security Notice -->
<div class="mt-8 flex items-center justify-center gap-2 text-center border-t border-outline-variant pt-6">
<span class="material-symbols-outlined text-outline text-sm">security</span>
<p class="font-label-bold text-label-bold text-outline uppercase tracking-wide">Authorized access only</p>
</div>
</div>
</main>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
